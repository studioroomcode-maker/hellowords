<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Hello Words - IELTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a; --surface:#141414; --border:#252525; --accent:#e8ff47;
  --text:#f0f0e8; --sub:#666660; --card:#1a1a1a;
  --b5:#4CAF7D; --b6:#4A9EFF; --b7:#FF7043;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{
  position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;
}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:14px;text-decoration:none;transition:color .2s;flex-shrink:0;}
.back-btn:hover{color:var(--text);}
.brand{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;color:var(--accent);}
.level-chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.5px;}
.chip-5{background:rgba(76,175,125,.15);color:var(--b5);border:1px solid rgba(76,175,125,.3);}
.chip-6{background:rgba(74,158,255,.15);color:var(--b6);border:1px solid rgba(74,158,255,.3);}
.chip-7{background:rgba(255,112,67,.15);color:var(--b7);border:1px solid rgba(255,112,67,.3);}
.search-wrap{flex:1;position:relative;}
.search-wrap input{
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 14px 9px 36px;
  outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--sub);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:14px;pointer-events:none;}
.list-wrap{padding:12px 20px 40px;}
.word-item{
  display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);
  border:1px solid var(--border);border-radius:12px;margin-bottom:6px;text-decoration:none;
  color:inherit;transition:all .15s;
}
.word-item:hover{border-color:#3a3a3a;background:#202020;transform:translateX(2px);}
.word-item:active{transform:scale(.98);}
.level-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-5{background:var(--b5);}
.dot-6{background:var(--b6);}
.dot-7{background:var(--b7);}
.word-en{font-size:15px;font-weight:600;color:var(--text);flex:1;}
.word-meaning{font-size:13px;color:var(--sub);text-align:right;max-width:45%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.count-bar{font-size:12px;color:var(--sub);padding:8px 20px 4px;text-align:right;}
.empty{text-align:center;padding:60px 20px;color:var(--sub);}
.empty-icon{font-size:36px;margin-bottom:12px;}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html">Back</a>
  <span class="brand">Hello Words</span>
  <div class="level-chip" id="levelChip"></div>
  <div class="search-wrap">
    <span class="search-icon">S</span>
    <input type="search" id="searchInput" placeholder="Search IELTS words..." oninput="onSearch(this.value)">
  </div>
</header>
<div class="count-bar" id="countBar"></div>
<div class="list-wrap" id="listWrap">
  <div class="empty"><div class="empty-icon">...</div><div>Loading...</div></div>
</div>
<script>
const params = new URLSearchParams(location.search);
const band = params.get('band') || '';
const validBands = new Set(['5', '6', '7']);
const bandColors = { '5': 'dot-5', '6': 'dot-6', '7': 'dot-7' };
let allWords = {};
let q = '';

async function init() {
  if (!validBands.has(band)) {
    showError('Invalid IELTS band.');
    return;
  }

  try {
    const res = await fetch(`../level_data/ielts_${band}.json`);
    if (!res.ok) throw new Error('load failed');
    allWords = await res.json();
    const chip = document.getElementById('levelChip');
    chip.textContent = `IELTS ${band}`;
    chip.className = `level-chip chip-${band}`;
    document.title = `Hello Words - IELTS ${band}`;
    document.getElementById('searchInput').placeholder = `Search IELTS band ${band} words...`;
    render();
  } catch (err) {
    showError('Failed to load words.');
  }
}

function onSearch(value) {
  q = value.trim().toLowerCase();
  render();
}

function render() {
  const wrap = document.getElementById('listWrap');
  const items = Object.entries(allWords)
    .filter(([_, word]) => {
      const en = (word.word || '').toLowerCase();
      const meaning = (word.meaning || '').toLowerCase();
      return !q || en.includes(q) || meaning.includes(q);
    })
    .sort((a, b) => a[1].word.localeCompare(b[1].word));

  document.getElementById('countBar').textContent = `${items.length} words`;

  if (!items.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">0</div><div>No matching words.</div></div>';
    return;
  }

  const dotClass = bandColors[band];
  wrap.innerHTML = items.map(([key, word]) => {
    const meaning = word.meaning || '';
    const shortMeaning = meaning.length > 26 ? `${meaning.slice(0, 26)}...` : meaning;
    return `<a class="word-item" href="word.html?band=${encodeURIComponent(band)}&w=${encodeURIComponent(key)}">
      <div class="level-dot ${dotClass}"></div>
      <div class="word-en">${word.word || key}</div>
      <div class="word-meaning">${shortMeaning}</div>
    </a>`;
  }).join('');
}

function showError(message) {
  document.getElementById('countBar').textContent = '';
  document.getElementById('listWrap').innerHTML = `<div class="empty"><div class="empty-icon">!</div><div>${message}</div></div>`;
}

init();
</script>
</body>
</html>
