<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Hello Words - TOPIK 3 VN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a; --surface:#141414; --border:#252525; --accent:#e8ff47;
  --text:#f0f0e8; --sub:#666660; --card:#1a1a1a;
  --c1:#4CAF7D; --c2:#4CAF7D; --c3:#4A9EFF; --c4:#4A9EFF; --c5:#FF7043; --c6:#FF7043;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:14px;text-decoration:none;transition:color .2s;flex-shrink:0;}
.back-btn:hover{color:var(--text);}
.brand{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;color:var(--accent);}

.nav-btns{margin-left:auto;display:flex;gap:8px;}
.nav-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.nav-btn:hover{border-color:#3a3a3a;background:#222;}
.nav-btn:disabled{opacity:.3;cursor:default;}
.content{padding:24px 20px 100px;max-width:600px;margin:0 auto;}
.level-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.5px;margin-bottom:16px;background:rgba(74,158,255,.15);color:#4A9EFF;border:1px solid rgba(74,158,255,.3);}
.word-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;margin-bottom:16px;}
.word-main{font-family:'Noto Sans KR',sans-serif;font-size:clamp(28px,10vw,56px);font-weight:900;line-height:1.1;color:var(--text);margin-bottom:8px;word-break:keep-all;overflow-wrap:break-word;letter-spacing:-0.5px;}
.pos-tag{font-size:13px;color:var(--sub);margin-bottom:16px;}
.tts-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--sub);font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:20px;font-family:'DM Sans',sans-serif;}
.tts-btn:hover,.tts-btn.playing{border-color:var(--accent);color:var(--accent);}
.tts-btn.playing{background:rgba(232,255,71,.08);}
.divider{height:1px;background:var(--border);margin:20px 0;}
.meaning-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:8px;}
.meaning-text{font-size:24px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:16px;}
.syns-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.syn-tag{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--sub);font-family:'Noto Sans KR',sans-serif;}
.section{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 24px;margin-bottom:12px;}
.section-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:16px;}
.example-item{padding:14px 0;border-bottom:1px solid var(--border);}
.example-item:first-child{padding-top:0;}
.example-item:last-child{border-bottom:none;padding-bottom:0;}
.ex-hidden{display:none;}
.more-btn{display:block;width:100%;margin-top:12px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--sub);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
.more-btn:hover{border-color:var(--accent);color:var(--accent);}
.ex-num{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:5px;}
.ex-situation{display:inline-block;font-size:11px;color:var(--sub);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:2px 8px;margin-bottom:7px;}
.ex-row{display:flex;align-items:flex-start;gap:10px;}
.ex-text{flex:1;}
.ex-ko{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:4px;font-family:'Noto Sans KR',sans-serif;}
.ex-ko b{color:var(--accent);font-weight:700;}
.ex-tl{font-size:13px;color:var(--sub);line-height:1.6;}
.ex-speak-btn{flex-shrink:0;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--sub);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px;}
.ex-speak-btn:hover{border-color:var(--accent);color:var(--accent);}
.ex-speak-btn.playing{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.08);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;}
.bottom-nav-btn{flex:1;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.bottom-nav-btn:hover{background:#222;border-color:#3a3a3a;}
.bottom-nav-btn.primary{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:700;}
.bottom-nav-btn.primary:hover{background:#d4eb3a;}
.bottom-nav-btn:disabled{opacity:.3;cursor:default;}
.error-wrap{text-align:center;padding:80px 20px;color:var(--sub);}
.error-icon{font-size:48px;margin-bottom:16px;}
.error-text{font-size:16px;margin-bottom:20px;}
.error-link{display:inline-block;padding:12px 24px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);text-decoration:none;font-size:14px;}
</style>
</head>
<body>
<header>
  <a class="back-btn" id="backBtn" href="index.html">List</a>
  <span class="brand">Hello Words</span>
  <div class="nav-btns">
    <button class="nav-btn" id="prevBtn" onclick="goWord(-1)">Prev</button>
    <button class="nav-btn" id="nextBtn" onclick="goWord(1)">Next</button>
  </div>
</header>
<div class="content" id="content">
  <div class="error-wrap"><div class="error-icon">...</div><div class="error-text">Loading...</div></div>
</div>
<div class="bottom-nav" id="bottomNav" style="display:none">
  <button class="bottom-nav-btn" onclick="goWord(-1)" id="prevBtnBottom">Prev</button>
  <button class="bottom-nav-btn primary" id="wordSpeakBtn" onclick="speakWord()">Speak</button>
  <button class="bottom-nav-btn" onclick="goWord(1)" id="nextBtnBottom">Next</button>
</div>
<script>
const LANG='vn', LEVEL='3', LABEL='Vietnamese';
const cache={};
const params=new URLSearchParams(location.search);
let currentKey=params.get('w')||'';
let allWords={}, wordKeys=[];


function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function loadWords(){
  const res=await fetch('../../../level_data/topik_'+LANG+'_lv'+LEVEL+'.json');
  if(!res.ok) throw new Error('Failed');
  return await res.json();
}

function hlKo(text,word){
  const s=esc(text||'');
  if(!text||!word) return s;
  return s.replace(new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<b>$&</b>');
}

function updateNav(i){
  const dp=i<=0,dn=i>=wordKeys.length-1;
  document.getElementById('prevBtn').disabled=dp;
  document.getElementById('nextBtn').disabled=dn;
  document.getElementById('prevBtnBottom').disabled=dp;
  document.getElementById('nextBtnBottom').disabled=dn;
}

function fitFont(){
  const el=document.getElementById('wordMain');
  if(!el) return;
  let s=parseInt(getComputedStyle(el).fontSize,10);
  while(el.scrollWidth>el.parentElement.clientWidth-48&&s>20)el.style.fontSize=(--s)+'px';
}

function hydrateJa(){} function loadJaCache(){} function needsTl(ko,tl){return false;}

function render(){
  const word=allWords[currentKey];
  if(!word){showError('Word not found.');return;}
  const idx=wordKeys.indexOf(currentKey);
  const examples=Array.isArray(word.examples)&&word.examples.length?word.examples:[{situation:word.situation||'',ko:word.example_ko||'',tl:word.example_tl||''}];
  const syns=(word.synonyms||[]).map(s=>'<span class="syn-tag">'+esc(s)+'</span>').join('');
  const badge='TOPIK '+LEVEL+' - '+LABEL+' - '+(idx+1)+' / '+wordKeys.length;
  const PRIMARY=3;
  const exHtml=examples.map((ex,i)=>{
    const needs=needsTl(ex.ko||'',ex.tl||'');
    const tlAttr=needs?' data-jp="1" data-ko="'+esc(ex.ko||'')+'"':'';
    const tlText=needs?'Translating...':esc(ex.tl||'');
    const hideCls=i>=PRIMARY?' ex-hidden':'';
    return '<div class="example-item'+hideCls+'">'
      +'<div class="ex-num">EX '+(i+1)+'</div>'
      +(ex.situation?'<div class="ex-situation">'+esc(ex.situation)+'</div>':'')
      +'<div class="ex-row"><div class="ex-text">'
      +'<div class="ex-ko">'+hlKo(ex.ko||'',word.word||'')+'</div>'
      +'<div class="ex-tl"'+tlAttr+'>'+tlText+'</div>'
      +'</div><button class="ex-speak-btn" type="button" data-speak="'+esc(ex.ko||'')+'">TTS</button></div></div>';
  }).join('');
  const moreBtn=examples.length>PRIMARY
    ?'<button class="more-btn" onclick="showMore(this)">+ '+(examples.length-PRIMARY)+' more examples</button>'
    :'';

  document.title=word.word+' - Hello Words TOPIK';
  history.replaceState(null,'','?w='+encodeURIComponent(currentKey));
  updateNav(idx);

  document.getElementById('content').innerHTML=
    '<div class="level-badge">'+esc(badge)+'</div>'
    +'<div class="word-card">'
    +'<div class="word-main" id="wordMain">'+esc(word.word||currentKey)+'</div>'
    +(word.pos?'<div class="pos-tag">'+esc(word.pos)+'</div>':'')
    +'<button class="tts-btn" id="wordTtsBtn" type="button" onclick="speakWord()">Speak word</button>'
    +'<div class="divider"></div>'
    +'<div class="meaning-label">Translation</div>'
    +'<div class="meaning-text">'+esc(word.meaning||'')+'</div>'
    +(syns?'<div class="syns-wrap">'+syns+'</div>':'')
    +'</div>'
    +'<div class="section"><div class="section-label">Examples '+examples.length+'</div>'+exHtml+moreBtn+'</div>';

  document.querySelectorAll('[data-speak]').forEach(btn=>{
    btn.addEventListener('click',()=>speakSentence(btn,btn.getAttribute('data-speak')||''));
  });
  hydrateJa();
  document.getElementById('bottomNav').style.display='flex';
  window.scrollTo(0,0);
  fitFont();
}

function speakText(text,btn){
  if(!window.speechSynthesis||!text) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=0.85;
  if(btn){btn.classList.add('playing');btn.textContent='...';}
  u.onend=u.onerror=()=>{if(btn){btn.classList.remove('playing');btn.textContent=btn.id==='wordTtsBtn'?'Speak word':'TTS';}};
  window.speechSynthesis.speak(u);
}

function speakWord(){const w=allWords[currentKey];if(w)speakText(w.word||'',document.getElementById('wordTtsBtn'));}
function speakSentence(btn,text){
  document.querySelectorAll('.ex-speak-btn.playing').forEach(b=>{b.classList.remove('playing');b.textContent='TTS';});
  speakText(text,btn);
}

function showMore(btn){const s=btn.closest('.section');s.querySelectorAll('.ex-hidden').forEach(el=>el.classList.remove('ex-hidden'));btn.remove();}
function goWord(dir){
  const i=wordKeys.indexOf(currentKey),next=i+dir;
  if(next>=0&&next<wordKeys.length){currentKey=wordKeys[next];render();}
}

function showError(msg){
  document.getElementById('content').innerHTML=
    '<div class="error-wrap"><div class="error-icon">!</div>'
    +'<div class="error-text">'+esc(msg)+'</div>'
    +'<a class="error-link" href="index.html">Back to list</a></div>';
}

async function init(){
  try{
    allWords=await loadWords();
    wordKeys=Object.keys(allWords).sort((a,b)=>a.localeCompare(b,'ko'));
    if(!currentKey||!allWords[currentKey])currentKey=wordKeys[0];
    render();
  }catch(e){showError('Failed to load words.');}
}
init();
</script>
</body>
</html>
